<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Create Account · X Panel</title>
  <style>
    :root{--bg:#060812;--glass:rgba(255,255,255,.07);--b:rgba(255,255,255,.14);--t:rgba(255,255,255,.92);--m:rgba(255,255,255,.65);--a:#00d4ff;--a2:#7b61ff}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;color:var(--t);
      font-family:system-ui,Segoe UI,Roboto,Arial;background:
      radial-gradient(900px 500px at 10% 10%, rgba(0,212,255,.22), transparent 60%),
      radial-gradient(800px 500px at 90% 20%, rgba(123,97,255,.18), transparent 55%),
      linear-gradient(180deg,#070a12,#05060a);
    }
    .card{width:min(460px,92vw);border:1px solid var(--b);background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
      border-radius:18px;backdrop-filter:blur(16px);box-shadow:0 18px 60px rgba(0,0,0,.55);padding:18px}
    .title{display:flex;align-items:center;gap:10px;font-weight:950;letter-spacing:.6px;text-transform:uppercase}
    .logo{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;
      background:radial-gradient(circle at 30% 30%, rgba(0,212,255,.9), transparent 60%),
               radial-gradient(circle at 70% 70%, rgba(123,97,255,.7), transparent 55%),
               rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14)
    }
    .sub{margin-top:6px;color:var(--m);font-size:12px}
    input{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.35);color:var(--t);outline:none;margin-top:10px}
    .row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .btn{flex:1;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--t);font-weight:900;cursor:pointer}
    .btn.primary{border:0;color:#00131c;background:linear-gradient(135deg,rgba(0,212,255,.95),rgba(123,97,255,.85))}
    .msg{margin-top:10px;color:var(--m);font-size:12px;min-height:16px}
    .error{color:#ff6b6b}
    .success{color:#7CFF7C}
    a{color:var(--a);text-decoration:none;font-weight:900}
  </style>
</head>
<body>
  <div class="card">
    <div class="title"><div class="logo">✨</div> Create Account</div>
    <div class="sub">Normal User Get Only 1 Server Free , Want more DM TG @AX_RO</div>

    <input id="u" placeholder="Username (letters/numbers/_/.)">
    <input id="e" placeholder="Email">
    <input id="p" placeholder="Password (min 6)" type="password">
    <input id="p2" placeholder="Re-enter password" type="password">

    <div class="row">
      <button class="btn primary" onclick="doCreate()">Create</button>
      <button class="btn" onclick="location.href='/login'">Back to Login</button>
    </div>

    <div class="msg" id="m"></div>
    <div class="sub" style="margin-top:8px">A verification code will be sent to your email.</div>
  </div>

<script>
async function doCreate(){
  const m=document.getElementById('m');
  m.innerHTML='Creating...';
  const username=document.getElementById('u').value.trim();
  const email=document.getElementById('e').value.trim();
  const password=document.getElementById('p').value;
  const password2=document.getElementById('p2').value;

  // Validation
  if (!username || username.length < 3) {
    m.innerHTML='<span class="error">Username must be at least 3 characters</span>';
    return;
  }
  if (!email || !email.includes('@')) {
    m.innerHTML='<span class="error">Please enter a valid email</span>';
    return;
  }
  if (password.length < 6) {
    m.innerHTML='<span class="error">Password must be at least 6 characters</span>';
    return;
  }
  if (password !== password2) {
    m.innerHTML='<span class="error">Passwords do not match</span>';
    return;
  }

  try {
    const r=await fetch('/api/auth/create',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,email,password,password2})
    });
    const d=await r.json().catch(()=>({success:false,message:'Server error'}));
    
    if(!r.ok || !d.success){ 
      m.innerHTML='<span class="error">' + (d.message||'Create failed') + '</span>';
      return; 
    }
    
    if (d.requires_verification) {
      m.innerHTML='<span class="success">✅ Account created! Redirecting to verification...</span>';
      setTimeout(() => location.href = `/verify?username=${encodeURIComponent(d.username)}`, 800);
    } else {
      m.innerHTML='<span class="success">✅ Account created! Redirecting to login...</span>';
      setTimeout(() => location.href='/login', 800);
    }
  } catch(e) {
    m.innerHTML='<span class="error">Network error. Please try again.</span>';
  }
}

// Enter key support
document.getElementById('u').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('e').focus();
});
document.getElementById('e').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('p').focus();
});
document.getElementById('p').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('p2').focus();
});
document.getElementById('p2').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doCreate();
});
</script>
</body>
</html>
